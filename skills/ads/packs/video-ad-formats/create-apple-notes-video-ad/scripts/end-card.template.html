<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>end card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1180px; height: 2100px;
    background: {{BG_COLOR}};
    color: {{INK_COLOR}};
    font-family: "Special Elite", "Courier New", monospace;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
  }

  /* Subtle paper texture across the scene background. */
  body::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 24px 24px, 48px 48px;
    background-position: 0 0, 12px 12px;
    pointer-events: none;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The polaroid-style white card. Slight tilt for scrapbook feel. */
  .card {
    position: relative;
    width: 920px;
    height: 1640px;
    background: #ffffff;
    border-radius: 8px;
    padding: 100px 80px 90px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    transform: rotate(-3deg);
    box-shadow:
      0 24px 64px rgba(0, 0, 0, 0.14),
      0 4px 12px rgba(0, 0, 0, 0.08);
  }

  /* ---- Headline ---- */
  .headline {
    text-align: center;
    color: {{INK_COLOR}};
    font-family: "Permanent Marker", "Special Elite", system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.06;
    letter-spacing: 0.005em;
  }
  .headline .line-1 {
    font-size: 112px;
    display: inline-block;
  }
  .headline .underline {
    display: inline-block;
    position: relative;
  }
  .headline .underline::after {
    content: "";
    position: absolute;
    left: -4%;
    right: -4%;
    bottom: -6px;
    height: 8px;
    background: {{INK_COLOR}};
    border-radius: 6px;
    transform: skewX(-2deg);
  }
  .headline .line-2 {
    font-size: 120px;
    margin-top: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  .headline .circled {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 158px;
    height: 158px;
    border: 8px solid {{INK_COLOR}};
    border-radius: 50%;
    line-height: 1;
    padding-bottom: 8px;
    transform: rotate(-4deg);
  }

  /* ---- Product image ---- */
  .product {
    flex: 1 1 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px 0 20px 0;
  }
  .product img {
    display: block;
    max-width: 560px;
    max-height: 720px;
    height: auto;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 22px 28px rgba(0,0,0,0.18));
  }

  /* ---- Checklist ---- */
  .checklist {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }
  .check-row {
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 26px;
    padding-bottom: 18px;
    border-bottom: 3px solid {{INK_COLOR}};
  }
  .check-label {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 36px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: {{INK_COLOR}};
    flex: 0 0 auto;
    min-width: 320px;
  }
  .check-value {
    font-family: "Permanent Marker", "Special Elite", system-ui, sans-serif;
    font-size: 64px;
    letter-spacing: 0.005em;
    color: {{INK_COLOR}};
    flex: 1 1 auto;
    transform: rotate(-1deg);
  }
  .check-mark {
    font-family: "Permanent Marker", system-ui, sans-serif;
    font-size: 72px;
    color: {{INK_COLOR}};
    flex: 0 0 auto;
    transform: rotate(4deg);
    line-height: 1;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="card">
    <div class="headline">
      <div class="line-1">{{HEADLINE_PRE_HTML}}</div>
      <div class="line-2">{{HEADLINE_MAIN_HTML}}</div>
    </div>
    <div class="product">{{PRODUCT_IMG}}</div>
    <div class="checklist">{{CHECKLIST_ROWS}}</div>
  </div>
</div>
</body>
</html>
