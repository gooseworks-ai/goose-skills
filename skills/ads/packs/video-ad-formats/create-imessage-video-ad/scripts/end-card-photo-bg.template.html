<!DOCTYPE html>
<!--
  Photo-as-background end-card variant. Use this when the brand voice is
  grounded (athlete / persona / lifestyle) rather than playful. Example:
  Peloton — Ironman Comeback uses this with an athlete-on-bike photo.

  Required asset: assets/hero.png (or update HERO_PATH in
  render-end-card.template.js). Recommended: 1080x1920 or larger,
  athlete/product/persona shot with negative space at top and bottom for the
  scrim overlays to do their job.
-->
<html><head><meta charset="utf-8"><title>End card</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 720px; height: 1280px; background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: relative; width: 100%; height: 100%;
    overflow: hidden;
  }
  /* Hero photo fills the frame. Subtle desaturation so text wins. */
  .bg {
    position: absolute; inset: 0;
    background-image: url('<!--{{HERO_IMG_DATA}}-->');
    background-size: cover;
    background-position: center 30%;
    filter: saturate(0.85) brightness(0.78);
  }
  /* Top-down + bottom-up scrim. Top is near-opaque so the white logo on a
     potentially bright photo still wins; bottom is dark for the CTA pill.
     See SKILL.md > end-card recipe > "Logo on a bright background". */
  .scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.98) 0%,
        rgba(0,0,0,0.92) 8%,
        rgba(0,0,0,0.55) 18%,
        rgba(0,0,0,0.10) 35%,
        rgba(0,0,0,0.0) 50%,
        rgba(0,0,0,0.50) 78%,
        rgba(0,0,0,0.96) 100%);
  }

  .logo {
    position: absolute; left: 50%; top: 64px;
    transform: translateX(-50%);
    width: 300px; height: auto;
    z-index: 2;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.95));
  }
  .logo svg { width: 100%; height: auto; display: block; }
  .logo svg path { fill: #fff; }

  .code-row {
    position: absolute; left: 50%; bottom: 130px;
    transform: translateX(-50%);
    z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 22px;
  }
  .code-row .offer {
    font-size: 26px; font-weight: 600; color: #fff;
    letter-spacing: -0.3px; text-align: center;
    text-shadow: 0 2px 12px rgba(0,0,0,0.85);
  }
  /* Brand-color CTA pill. Replace --brand with your primary hex.
     See SKILL.md > end-card recipe > "CTA pill color = brand primary". */
  .code-row .code {
    --brand: #E1251B;
    font-size: 76px; font-weight: 800; letter-spacing: 8px;
    background: var(--brand); color: #fff;
    padding: 22px 44px;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(225,37,27,0.45),
                0 4px 16px rgba(0,0,0,0.5);
    font-feature-settings: "tnum" 1;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="logo"><!--{{BRAND_LOGO_SVG}}--></div>
  <div class="code-row">
    <div class="offer">30 days free trial. No commitment.</div>
    <div class="code">RACE30</div>
  </div>
</div>
</body></html>
