<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Strava activity</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 720px; height: 880px; background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: #1c1c1e; -webkit-font-smoothing: antialiased; }
  .card {
    width: 100%; height: 100%; background: #fff;
    display: flex; flex-direction: column;
    border-radius: 0;
  }

  /* Top brand strip with Strava-orange */
  .brandstrip {
    height: 56px; background: #FC4C02;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; color: #fff;
  }
  .brandstrip .logo {
    font-size: 18px; font-weight: 800; letter-spacing: -0.2px;
    text-transform: uppercase;
  }
  .brandstrip .logo svg {
    vertical-align: middle; margin-right: 6px;
  }
  .brandstrip .right {
    font-size: 13px; opacity: 0.92; font-weight: 500;
  }

  /* Athlete row */
  .who-row {
    padding: 18px 24px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #efefef;
  }
  .who-row .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #FC4C02 0%, #f08800 100%);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 17px;
  }
  .who-row .who { font-size: 16px; font-weight: 700; color: #1c1c1e; }
  .who-row .when { font-size: 13px; color: #777; margin-top: 2px; }

  /* Activity title */
  .title-row {
    padding: 16px 24px 4px;
  }
  .title-row .activity-type {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: #FC4C02; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title-row h1 {
    font-size: 30px; font-weight: 800; letter-spacing: -0.7px;
    line-height: 1.15; color: #1c1c1e;
  }

  /* Map polyline (stylized SVG) */
  .map {
    margin: 16px 24px 8px;
    height: 220px;
    background: linear-gradient(180deg, #f7f7f7 0%, #ececec 100%);
    border-radius: 12px;
    position: relative; overflow: hidden;
  }
  .map svg {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  }
  .map .pin {
    position: absolute; width: 14px; height: 14px;
    background: #1c1c1e; border-radius: 50%; border: 3px solid #fff;
    box-shadow: 0 0 0 2px #1c1c1e;
  }
  .map .pin.start { left: 8%;  top: 70%; }
  .map .pin.end   { left: 88%; top: 28%; background: #FC4C02; box-shadow: 0 0 0 2px #FC4C02; }
  .map .pin.end::after {
    content: ''; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    width: 4px; height: 4px; background: #fff; border-radius: 50%;
  }

  /* Stats grid */
  .stats {
    padding: 14px 24px 22px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .stat .k {
    font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 1.4px; font-weight: 600;
  }
  .stat .v {
    font-size: 28px; font-weight: 800; color: #1c1c1e; margin-top: 4px;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
  }
  .stat .v small { font-size: 14px; color: #999; font-weight: 500; margin-left: 2px; letter-spacing: 0; }

  /* Kudos row */
  .kudos {
    padding: 12px 24px 0;
    border-top: 1px solid #efefef;
    display: flex; align-items: center; gap: 16px;
    color: #777; font-size: 13px; font-weight: 500;
  }
  .kudos .item { display: flex; align-items: center; gap: 6px; }
  .kudos .icon {
    display: inline-block; width: 18px; height: 18px;
    background: #1c1c1e; mask-size: contain; mask-repeat: no-repeat; mask-position: center;
    -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brandstrip">
      <div class="logo">STRAVA</div>
      <div class="right">2h ago · Public</div>
    </div>

    <div class="who-row">
      <div class="avatar">M</div>
      <div>
        <div class="who">Marcus K.</div>
        <div class="when">Sunday morning · Sonoma, CA</div>
      </div>
    </div>

    <div class="title-row">
      <div class="activity-type">Triathlon · Race</div>
      <h1>Crossed the line.<br>First race in two years.</h1>
    </div>

    <div class="map">
      <svg viewBox="0 0 660 220" preserveAspectRatio="none">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M40 0 L0 0 0 40" fill="none" stroke="#dedede" stroke-width="1"/>
          </pattern>
        </defs>
        <rect width="660" height="220" fill="url(#grid)"/>
        <path d="M55,154 C 110,140 140,170 180,140 C 220,110 240,80 300,90 C 360,100 380,140 430,120 C 480,100 510,60 580,62"
              fill="none" stroke="#FC4C02" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M55,154 C 110,140 140,170 180,140 C 220,110 240,80 300,90 C 360,100 380,140 430,120 C 480,100 510,60 580,62"
              fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 8" stroke-linecap="round"/>
      </svg>
      <div class="pin start"></div>
      <div class="pin end"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Time</div><div class="v">5:18:42</div></div>
      <div class="stat"><div class="k">Distance</div><div class="v">70.3<small>mi</small></div></div>
      <div class="stat"><div class="k">Pace</div><div class="v">7:32<small>/mi</small></div></div>
    </div>

    <div class="kudos">
      <div class="item">❤︎ 247 kudos</div>
      <div class="item">💬 18 comments</div>
    </div>
  </div>
</body></html>
