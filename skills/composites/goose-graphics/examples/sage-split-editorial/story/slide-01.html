<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>5 Tips for Building a Startup in 2026 — Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Serif+4:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sage: #B8C9B8;
            --color-card: #F5F2ED;
            --color-art: #0A0A0A;
            --color-text: #1A1A1A;
            --color-body: #444444;
            --color-meta: #777777;
            --color-pink: #F7A8C4;
            --color-blue: #A8D8F0;
            --color-gold: #F5D78E;
            --color-border: #D4D4D4;
            --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
            --font-body: 'Source Serif 4', Georgia, serif;
            --font-ui: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --story-width: 1080px;
            --story-height: 1920px;
            --safe-top: 160px;
            --safe-bottom: 160px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-sage);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
    </style>
</head>
<body>

    <!-- Progress segments (inside top safe zone) -->
    <div style="
        position: absolute;
        top: 60px;
        left: 60px;
        right: 60px;
        display: flex;
        gap: 6px;
        z-index: 10;
    ">
        <div style="flex: 1; height: 3px; background: rgba(26,26,26,0.55); border-radius: 2px;"></div>
        <div style="flex: 1; height: 3px; background: rgba(26,26,26,0.18); border-radius: 2px;"></div>
        <div style="flex: 1; height: 3px; background: rgba(26,26,26,0.18); border-radius: 2px;"></div>

        <div style="flex: 1; height: 3px; background: rgba(26,26,26,0.18); border-radius: 2px;"></div>
    </div>

        width: 960px;
        height: 1560px;
        overflow: hidden;
        position: relative;
    ">

        <!-- LEFT: Text column -->
        <div style="
            flex: 0 0 576px;
            background: #F5F2ED;
            padding: 88px 64px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        ">

            <!-- Metadata label -->
            <p style="
                font-family: 'Inter', sans-serif;
                font-size: 13px;
                font-weight: 500;
                letter-spacing: 1.8px;
                text-transform: uppercase;
                color: #777;
                margin-bottom: 52px;
            ">Startup Guide · 2026</p>

            <!-- Big 5 -->
            <p style="
                font-family: 'DM Serif Display', Georgia, serif;
                font-size: 160px;
                font-weight: 400;
                line-height: 1.00;
                letter-spacing: -3px;
                color: #1A1A1A;
                margin-bottom: 20px;
            ">5</p>

            <!-- Headline -->
            <h1 style="
                font-family: 'DM Serif Display', Georgia, serif;
                font-size: 58px;
                font-weight: 400;
                line-height: 1.15;
                letter-spacing: -0.8px;
                color: #1A1A1A;
                margin-bottom: 44px;
            ">Tips for<br>Building a<br>Startup<br>in 2026</h1>

            <!-- Thin divider -->
            <div style="
                width: 56px;
                height: 1px;
                background: #D4D4D4;
                margin-bottom: 44px;
            "></div>

            <!-- Body text -->
            <p style="
                font-family: 'Source Serif 4', Georgia, serif;
                font-size: 20px;
                font-weight: 400;
                line-height: 1.70;
                color: #444;
                margin-bottom: 16px;
            ">What nobody tells you before you leap.</p>

            <p style="
                font-family: 'Source Serif 4', Georgia, serif;
                font-size: 18px;
                font-weight: 400;
                line-height: 1.70;
                color: #777;
                margin-bottom: 60px;
            ">Hard-won lessons from founders who've been in the trenches.</p>

            <!-- CTA button -->
            <a style="
                display: inline-block;
                border: 1px solid #D4D4D4;
                color: #1A1A1A;
                font-family: 'Inter', sans-serif;
                font-size: 16px;
                font-weight: 500;
                letter-spacing: 0.3px;
                text-decoration: none;
                padding: 16px 28px;
                align-self: flex-start;

        </div>

            flex: 1;
            background: #0A0A0A;
            position: relative;
            overflow: hidden;
        ">

                height="100%"
                viewBox="0 0 384 1560"
                style="position: absolute; top: 0; left: 0;"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
            >
                <!-- Subtle background "5" numeral -->

                    x="-20"
                    y="700"
                    font-family="Georgia, serif"
                    font-size="560"
                    fill="#161616"

                <!-- Tertiary inner orbit -->

                <!-- Lower orbit cluster -->
                <circle cx="192" cy="1180" r="130" stroke="#F7A8C4" stroke-width="1" stroke-dasharray="3 5" fill="none" opacity="0.35"/>
                <circle cx="192" cy="1180" r="88" stroke="#A8D8F0" stroke-width="1" stroke-dasharray="4 5" fill="none" opacity="0.4"/>

                <path d="M60 80 C100 250 20 400 80 560 C140 720 60 900 120 1080 C180 1260 100 1380 160 1500" stroke="#2A2A2A" stroke-width="1.2" fill="none"/>
                <!-- Flowing trajectory curves — right -->
                <path d="M320 80 C280 250 360 400 300 560 C240 720 320 900 260 1080 C200 1260 280 1380 224 1500" stroke="#2A2A2A" stroke-width="1.2" fill="none"/>

                <ellipse cx="258" cy="920" rx="22" ry="38" fill="#F7A8C4" opacity="0.32"/>

                <!-- Pink lower accent -->
                <ellipse cx="192" cy="1160" rx="32" ry="56" fill="#F7A8C4" opacity="0.38"/>

                <!-- Gold axis dots — orbit intersections -->
                <circle cx="22" cy="520" r="5" fill="#F5D78E" opacity="0.9"/>
                <circle cx="362" cy="520" r="5" fill="#F5D78E" opacity="0.9"/>
                <circle cx="192" cy="350" r="5" fill="#F5D78E" opacity="0.9"/>
                <circle cx="192" cy="690" r="5" fill="#F5D78E" opacity="0.9"/>

                <!-- Gold secondary dots -->
                <circle cx="84" cy="350" r="3.5" fill="#F5D78E" opacity="0.65"/>
                <circle cx="300" cy="690" r="3.5" fill="#F5D78E" opacity="0.65"/>
                <circle cx="70" cy="692" r="3" fill="#F5D78E" opacity="0.5"/>
                <circle cx="314" cy="350" r="3" fill="#F5D78E" opacity="0.5"/>

                <!-- Gold lower accent dots -->
                <circle cx="192" cy="1050" r="4" fill="#F5D78E" opacity="0.6"/>
                <circle cx="192" cy="1310" r="3.5" fill="#F5D78E" opacity="0.45"/>
                <circle cx="62" cy="1180" r="3" fill="#F5D78E" opacity="0.5"/>
                <circle cx="322" cy="1180" r="3" fill="#F5D78E" opacity="0.5"/>

                <!-- Blue accent dots scattered on orbits -->
                <circle cx="310" cy="403" r="3" fill="#A8D8F0" opacity="0.75"/>
                <circle cx="74" cy="403" r="3" fill="#A8D8F0" opacity="0.75"/>
                <circle cx="310" cy="637" r="3" fill="#A8D8F0" opacity="0.75"/>
                <circle cx="74" cy="637" r="3" fill="#A8D8F0" opacity="0.75"/>

                <!-- Horizontal rule decorations -->
                <line x1="60" y1="1440" x2="324" y2="1440" stroke="#1E1E1E" stroke-width="1.2"/>
                <line x1="60" y1="1450" x2="192" y2="1450" stroke="#252525" stroke-width="0.8" opacity="0.6"/>

                <line x1="96" y1="0" x2="96" y2="1560" stroke="#161616" stroke-width="0.6" opacity="0.8"/>
                <line x1="192" y1="0" x2="192" y2="1560" stroke="#161616" stroke-width="0.6" opacity="0.8"/>

                <line x1="0" y1="390" x2="384" y2="390" stroke="#161616" stroke-width="0.6" opacity="0.6"/>
                <line x1="0" y1="780" x2="384" y2="780" stroke="#161616" stroke-width="0.6" opacity="0.6"/>
                <line x1="0" y1="1170" x2="384" y2="1170" stroke="#161616" stroke-width="0.6" opacity="0.6"/>

                <!-- Small cross markers at grid intersections — upper -->
                <line x1="189" y1="387" x2="195" y2="393" stroke="#2A2A2A" stroke-width="0.8"/>
                <line x1="195" y1="387" x2="189" y2="393" stroke="#2A2A2A" stroke-width="0.8"/>
                <line x1="285" y1="387" x2="291" y2="393" stroke="#2A2A2A" stroke-width="0.8"/>
                <line x1="291" y1="387" x2="285" y2="393" stroke="#2A2A2A" stroke-width="0.8"/>

                <!-- Stray light-trail lines — kinetic feel -->
                <line x1="40" y1="200" x2="160" y2="200" stroke="#1E1E1E" stroke-width="1"/>
                <line x1="40" y1="210" x2="110" y2="210" stroke="#252525" stroke-width="0.6" opacity="0.5"/>
                <line x1="220" y1="1350" x2="340" y2="1350" stroke="#1E1E1E" stroke-width="1"/>
                <line x1="250" y1="1360" x2="340" y2="1360" stroke="#252525" stroke-width="0.6" opacity="0.5"/>

            </svg>
        </div>

    </div>

    <!-- Brand footer (above bottom safe zone) -->
    <div style="
        position: absolute;
        bottom: 200px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 500;
        color: #1A1A1A;
        opacity: 0.55;
        white-space: nowrap;
        letter-spacing: 0.5px;
    ">@yourbrand</div>

</html>
