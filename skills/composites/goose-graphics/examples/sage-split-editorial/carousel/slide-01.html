<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Slide 01 — 5 Tips for Building a Startup in 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Serif+4:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-sage: #B8C9B8;
      --color-card: #F5F2ED;
      --color-art: #0A0A0A;
      --color-text: #1A1A1A;
      --color-body: #444444;
      --color-meta: #777777;
      --color-pink: #F7A8C4;
      --color-blue: #A8D8F0;
      --color-gold: #F5D78E;
      --color-border: #D4D4D4;

      --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-ui: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--color-sage);
      padding: 60px;
    }
  </style>
</head>
<body>

  <!-- Card: 960×960, split two-column -->
  <div style="
    width: 100%;
    height: 100%;
    background: var(--color-card);
    display: flex;
    overflow: hidden;
    position: relative;
  ">

    <!-- ── Left: text column ── -->
    <div style="
      flex: 0 0 58%;
      padding: 72px 56px 64px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    ">

      <!-- Metadata label -->
      <p style="
        font-family: var(--font-ui);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--color-meta);
        margin-bottom: 36px;
      ">Founder's Playbook · 2026</p>

      <!-- Decorative large "5" -->
      <p style="
        font-family: var(--font-display);
        font-size: 140px;
        font-weight: 400;
        line-height: 0.88;
        letter-spacing: -4px;
        color: var(--color-border);
        margin-bottom: 12px;
        user-select: none;
      ">5</p>

      <!-- Title -->
      <h1 style="
        font-family: var(--font-display);
        font-size: 62px;
        font-weight: 400;
        line-height: 1.10;
        letter-spacing: -1.5px;
        color: var(--color-text);
        margin-bottom: 28px;
      ">Tips for<br>Building a<br>Startup<br>in 2026</h1>

      <!-- Divider rule -->
      <div style="
        width: 48px;
        height: 1px;
        background: var(--color-border);
        margin-bottom: 28px;
      "></div>

      <!-- Subtitle -->
      <p style="
        font-family: var(--font-body);
        font-size: 18px;
        font-weight: 400;
        line-height: 1.65;
        color: var(--color-body);
        max-width: 380px;
        margin-bottom: 44px;
      ">What the best founders know that most people never figure out.</p>

      <!-- CTA -->
      <div>
        <a style="
          display: inline-block;
          border: 1px solid var(--color-border);
          color: var(--color-text);
          font-family: var(--font-ui);
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.3px;
          text-decoration: none;
          padding: 14px 28px;
        ">Read on &rarr;</a>
      </div>

      <!-- Slide indicator -->
      <div style="
        position: absolute;
        bottom: 40px;
        left: 64px;
        display: flex;
        gap: 8px;
        align-items: center;
      ">
        <div style="width: 20px; height: 3px; background: var(--color-text); border-radius: 2px;"></div>
        <div style="width: 6px; height: 3px; background: var(--color-border); border-radius: 2px;"></div>
        <div style="width: 6px; height: 3px; background: var(--color-border); border-radius: 2px;"></div>
        <div style="width: 6px; height: 3px; background: var(--color-border); border-radius: 2px;"></div>
        <div style="width: 6px; height: 3px; background: var(--color-border); border-radius: 2px;"></div>
      </div>

    </div><!-- /left -->

    <!-- ── Right: generative art panel ── -->
    <div style="
      flex: 0 0 42%;
      background: var(--color-art);
      position: relative;
      overflow: hidden;
    ">
      <svg
        width="100%" height="100%"
        viewBox="0 0 405 960"
        fill="none"
        preserveAspectRatio="xMidYMid slice"
        style="position: absolute; top: 0; left: 0;"
      >
        <!-- ─── Orbital rings ─── -->
        <!-- Primary blue orbit, centred upper third -->
        <circle cx="202" cy="310" r="195" stroke="#A8D8F0" stroke-width="1.5" stroke-dasharray="4 7" fill="none" opacity="0.55"/>
        <circle cx="202" cy="310" r="145" stroke="#A8D8F0" stroke-width="1"   stroke-dasharray="3 6" fill="none" opacity="0.35"/>
        <circle cx="202" cy="310" r="90"  stroke="#A8D8F0" stroke-width="0.8" stroke-dasharray="2 5" fill="none" opacity="0.45"/>

        <!-- Secondary gold orbit, lower section -->
        <circle cx="280" cy="760" r="150" stroke="#F5D78E" stroke-width="1.2" stroke-dasharray="3 6" fill="none" opacity="0.35"/>
        <circle cx="280" cy="760" r="95"  stroke="#F5D78E" stroke-width="0.8" stroke-dasharray="2 5" fill="none" opacity="0.25"/>

        <!-- Small pink orbit accent, top-right -->
        <circle cx="360" cy="120" r="55"  stroke="#F7A8C4" stroke-width="1" stroke-dasharray="2 4" fill="none" opacity="0.40"/>
        <circle cx="360" cy="120" r="28"  fill="#F7A8C4" opacity="0.12"/>

        <!-- ─── Flowing organic bezier paths ─── -->
        <!-- Dark structural lines -->
        <path d="M95 0 C70 180 160 280 115 460 C70 640 160 740 105 960"
              stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M140 0 C185 180 95 300 155 480 C215 640 95 740 155 960"
              stroke="#555" stroke-width="0.7" fill="none" opacity="0.3"/>

        <!-- Blue flowing accent lines -->
        <path d="M310 0 Q390 200 305 400 Q220 590 320 750 Q395 860 310 960"
              stroke="#A8D8F0" stroke-width="1.8" fill="none" opacity="0.38"/>
        <path d="M355 0 Q430 160 365 360 Q295 520 375 680 Q445 800 360 960"
              stroke="#A8D8F0" stroke-width="0.9" fill="none" opacity="0.2"/>

        <!-- Pink flowing accent line -->
        <path d="M50 520 Q130 570 90 680 Q55 780 115 900"
              stroke="#F7A8C4" stroke-width="2" fill="none" opacity="0.55"/>

        <!-- Gold thin curve -->
        <path d="M30 380 Q110 410 85 500 Q60 580 130 620"
              stroke="#F5D78E" stroke-width="1.5" fill="none" opacity="0.45"/>

        <!-- ─── Pink blob shapes ─── -->
        <ellipse cx="202" cy="290" rx="42" ry="78" fill="#F7A8C4" opacity="0.82"/>
        <ellipse cx="163" cy="370" rx="26" ry="48" fill="#F7A8C4" opacity="0.48"/>
        <ellipse cx="240" cy="820" rx="30" ry="52" fill="#F7A8C4" opacity="0.38"/>

        <!-- ─── Gold dot clusters ─── -->
        <circle cx="305" cy="195" r="5.5" fill="#F5D78E" opacity="0.90"/>
        <circle cx="320" cy="213" r="3.5" fill="#F5D78E" opacity="0.72"/>
        <circle cx="293" cy="215" r="4"   fill="#F5D78E" opacity="0.60"/>
        <circle cx="332" cy="190" r="2.5" fill="#F5D78E" opacity="0.80"/>
        <circle cx="314" cy="230" r="3"   fill="#F5D78E" opacity="0.50"/>
        <circle cx="345" cy="205" r="2"   fill="#F5D78E" opacity="0.65"/>

        <!-- Scattered blue dots -->
        <circle cx="60"  cy="200" r="2.5" fill="#A8D8F0" opacity="0.55"/>
        <circle cx="78"  cy="188" r="1.8" fill="#A8D8F0" opacity="0.40"/>
        <circle cx="50"  cy="220" r="2"   fill="#A8D8F0" opacity="0.45"/>
        <circle cx="88"  cy="210" r="1.5" fill="#A8D8F0" opacity="0.35"/>

        <!-- ─── Bottom composition anchor ─── -->
        <!-- Larger gold fill ellipse lower left -->
        <ellipse cx="80" cy="870" rx="45" ry="65" fill="#F5D78E" opacity="0.14"/>

        <!-- Tiny pink scatter bottom right -->
        <circle cx="370" cy="900" r="3"   fill="#F7A8C4" opacity="0.50"/>
        <circle cx="385" cy="915" r="2"   fill="#F7A8C4" opacity="0.35"/>
        <circle cx="358" cy="918" r="2.5" fill="#F7A8C4" opacity="0.42"/>

      </svg>
    </div><!-- /right art panel -->

  </div><!-- /card -->

</body>
</html>
