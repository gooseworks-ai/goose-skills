<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>5 Tips for Building a Startup in 2026 — Slide 01</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Serif+4:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-sage: #B8C9B8;
      --color-card: #F5F2ED;
      --color-art: #0A0A0A;
      --color-text: #1A1A1A;
      --color-body: #444444;
      --color-meta: #777777;
      --color-pink: #F7A8C4;
      --color-blue: #A8D8F0;
      --color-gold: #F5D78E;
      --color-border: #D4D4D4;

      --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-ui: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

      --slide-width: 1920px;
      --slide-height: 1080px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--color-sage);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px;
    }

    .card {
      background: var(--color-card);
      display: flex;
      width: 100%;
      max-width: 1776px;
      height: 936px;
      overflow: hidden;
    }

    /* Left text column */
    .col-text {
      flex: 0 0 58%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 88px;
    }

    .eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-meta);
      margin-bottom: 40px;
    }

    .eyebrow-rule {
      display: inline-block;
      width: 32px;
      height: 1px;
      background: var(--color-border);
      vertical-align: middle;
      margin-right: 12px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: 88px;
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -2px;
      color: var(--color-text);
      margin-bottom: 40px;
    }

    .hero-title em {
      font-style: italic;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--color-border);
      margin-bottom: 36px;
    }

    .body-copy {
      font-family: var(--font-body);
      font-size: 19px;
      font-weight: 400;
      line-height: 1.70;
      letter-spacing: 0.1px;
      color: var(--color-body);
      max-width: 560px;
      margin-bottom: 48px;
    }

    .cta-row {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .cta-btn {
      display: inline-block;
      border: 1px solid var(--color-border);
      color: var(--color-text);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-decoration: none;
      padding: 14px 28px;
    }

    .meta-tag {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-meta);
    }

    /* Right art column */
    .col-art {
      flex: 0 0 42%;
      background: var(--color-art);
      position: relative;
      overflow: hidden;
    }

    .slide-number {
      position: absolute;
      bottom: 36px;
      right: 48px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 400;
      color: var(--color-meta);
      letter-spacing: 0.5px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Left: Text column -->
    <div class="col-text">
      <p class="eyebrow">
        <span class="eyebrow-rule"></span>
        Founder Playbook &nbsp;·&nbsp; 2026 Edition
      </p>

      <h1 class="hero-title">
        5&nbsp;Tips for<br>
        Building a<br>
        <em>Startup</em><br>
        in&nbsp;2026
      </h1>

      <div class="divider"></div>

      <p class="body-copy">
        The rules have changed. AI-native teams, lean infrastructure, and
        founder-led distribution define the next wave of breakout companies.
        Here is what actually works today.
      </p>

      <div class="cta-row">
        <a class="cta-btn" href="#">Read on &rarr;</a>
        <span class="meta-tag">April 2026</span>
      </div>
    </div>

    <!-- Right: Art panel — purely visual, no text -->
    <div class="col-art">
      <svg width="100%" height="100%" viewBox="0 0 807 936"
           style="position:absolute;top:0;left:0;" fill="none"
           xmlns="http://www.w3.org/2000/svg">

        <!-- Large dotted orbital rings -->
        <circle cx="404" cy="468" r="310" stroke="#A8D8F0" stroke-width="1"
                stroke-dasharray="3 6" opacity="0.5"/>
        <circle cx="404" cy="468" r="220" stroke="#A8D8F0" stroke-width="1"
                stroke-dasharray="3 6" opacity="0.35"/>
        <circle cx="404" cy="468" r="140" stroke="#A8D8F0" stroke-width="0.75"
                stroke-dasharray="2 5" opacity="0.25"/>

        <!-- Off-centre tilted orbit -->
        <ellipse cx="500" cy="380" rx="260" ry="160"
                 stroke="#F5D78E" stroke-width="0.75" stroke-dasharray="2 5"
                 opacity="0.3" transform="rotate(-28 500 380)"/>

        <!-- Flowing bezier spine — left -->
        <path d="M200 0 C180 200 300 300 220 468 C140 640 280 780 240 936"
              stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>
        <!-- Flowing bezier spine — right -->
        <path d="M560 0 C620 180 460 320 540 468 C620 620 480 760 520 936"
              stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>

        <!-- Central pink organic blob -->
        <ellipse cx="404" cy="440" rx="64" ry="104"
                 fill="#F7A8C4" opacity="0.85"/>
        <ellipse cx="370" cy="500" rx="40" ry="64"
                 fill="#F7A8C4" opacity="0.5"/>

        <!-- Gold accent blob -->
        <ellipse cx="480" cy="340" rx="36" ry="56"
                 fill="#F5D78E" opacity="0.65"/>

        <!-- Light blue accent blobs -->
        <ellipse cx="310" cy="580" rx="28" ry="44"
                 fill="#A8D8F0" opacity="0.55"/>
        <ellipse cx="520" cy="620" rx="20" ry="32"
                 fill="#A8D8F0" opacity="0.40"/>

        <!-- Small scattered dots — pink -->
        <circle cx="340" cy="200" r="4" fill="#F7A8C4" opacity="0.7"/>
        <circle cx="560" cy="260" r="3" fill="#F7A8C4" opacity="0.5"/>
        <circle cx="260" cy="720" r="5" fill="#F7A8C4" opacity="0.4"/>
        <circle cx="600" cy="800" r="3" fill="#F7A8C4" opacity="0.45"/>

        <!-- Small scattered dots — gold -->
        <circle cx="620" cy="180" r="4" fill="#F5D78E" opacity="0.6"/>
        <circle cx="200" cy="460" r="3.5" fill="#F5D78E" opacity="0.45"/>
        <circle cx="680" cy="560" r="3" fill="#F5D78E" opacity="0.5"/>

        <!-- Small scattered dots — blue -->
        <circle cx="450" cy="140" r="3" fill="#A8D8F0" opacity="0.55"/>
        <circle cx="180" cy="340" r="4" fill="#A8D8F0" opacity="0.4"/>
        <circle cx="660" cy="700" r="3.5" fill="#A8D8F0" opacity="0.5"/>

        <!-- Subtle grid lines -->
        <line x1="404" y1="0" x2="404" y2="936"
              stroke="#333" stroke-width="0.5" opacity="0.4"/>
        <line x1="0" y1="468" x2="807" y2="468"
              stroke="#333" stroke-width="0.5" opacity="0.4"/>

        <!-- Corner cross-hair marks -->
        <line x1="80" y1="88" x2="112" y2="88" stroke="#444" stroke-width="0.75"/>
        <line x1="96" y1="72" x2="96" y2="104" stroke="#444" stroke-width="0.75"/>
        <line x1="695" y1="848" x2="727" y2="848" stroke="#444" stroke-width="0.75"/>
        <line x1="711" y1="832" x2="711" y2="864" stroke="#444" stroke-width="0.75"/>

      </svg>
    </div>

  </div>

  <div class="slide-number">01</div>

</body>
</html>
