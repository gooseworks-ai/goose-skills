<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Story 01 — 5 Tips for Building a Startup in 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-violet: #7C5CFC;
            --color-white: #FFFFFF;
            --color-navy: #1A1A2E;
            --color-purple-card: #6B4BD4;
            --color-orbit-light: #A18AFF;
            --color-orbit-dark: #5A3EB8;
            --color-pale: #E0D8FF;
            --color-text-dark: #1A1A1A;
            --font: 'DM Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --radius-card: 16px;

            --story-width: 1080px;
            --story-height: 1920px;
            --story-padding-x: 80px;
            --story-padding-y: 120px;
            --safe-top: 160px;
            --safe-bottom: 160px;
            --content-max-width: 920px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-violet);
            color: var(--color-white);
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--story-padding-y) var(--story-padding-x);
            position: relative;
        }

        .bg-orbits {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1920px;
            pointer-events: none;
        }

        .progress {
            position: absolute;
            top: 64px;
            left: 80px;
            right: 80px;
            display: flex;
            gap: 8px;
        }

        .progress .segment {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
        }

        .progress .segment.active {
            background: rgba(255, 255, 255, 0.95);
        }

        .story-content {
            width: 100%;
            max-width: 920px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            position: relative;
            z-index: 2;
        }

        .eyebrow {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--color-pale);
            opacity: 0.80;
            margin-bottom: 40px;
        }

        .title-number {
            font-family: var(--font);
            font-size: 220px;
            font-weight: 700;
            line-height: 0.90;
            letter-spacing: -6px;
            color: rgba(255, 255, 255, 0.10);
            position: absolute;
            top: -60px;
            right: -20px;
        }

        .title {
            font-family: var(--font);
            font-size: 102px;
            font-weight: 700;
            line-height: 1.04;
            letter-spacing: -2px;
            color: var(--color-white);
            margin-bottom: 48px;
        }

        .title em {
            font-style: normal;
            color: var(--color-pale);
        }

        .divider {
            width: 64px;
            height: 3px;
            background: var(--color-orbit-light);
            border-radius: 2px;
            margin-bottom: 48px;
        }

        .subtitle {
            font-family: var(--font);
            font-size: 30px;
            font-weight: 400;
            line-height: 1.50;
            color: rgba(224, 216, 255, 0.80);
            max-width: 720px;
        }

        .tag-row {
            display: flex;
            gap: 16px;
            margin-top: 72px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(161, 138, 255, 0.35);
            border-radius: 100px;
            padding: 12px 28px;
            font-family: var(--font);
            font-size: 18px;
            font-weight: 500;
            color: var(--color-pale);
            letter-spacing: 0.3px;
        }

        .brand {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 40px);
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font);
            font-size: 20px;
            font-weight: 500;
            color: rgba(224, 216, 255, 0.55);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .swipe-hint {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 92px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .swipe-hint span {
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(224, 216, 255, 0.50);
        }

        .swipe-dots {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .swipe-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(161, 138, 255, 0.50);
        }

        .swipe-dot:first-child {
            opacity: 1;
        }

        .swipe-dot:nth-child(2) {
            opacity: 0.65;
        }

        .swipe-dot:last-child {
            opacity: 0.30;
        }
    </style>
</head>
<body>

    <!-- Full-bleed orbital background illustration -->
    <svg class="bg-orbits" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Large background ellipses — very faint -->
        <ellipse cx="900" cy="320" rx="480" ry="280" stroke="rgba(161,138,255,0.18)" stroke-width="1.5"/>
        <ellipse cx="900" cy="320" rx="360" ry="200" stroke="rgba(161,138,255,0.12)" stroke-width="1"/>
        <ellipse cx="900" cy="320" rx="220" ry="130" stroke="rgba(161,138,255,0.09)" stroke-width="1"/>

        <!-- Orbital arc — top-right cluster -->
        <path d="M620 -80 Q820 180 1120 260" stroke="rgba(161,138,255,0.22)" stroke-width="1.5" fill="none"/>
        <path d="M700 -120 Q940 120 1200 300" stroke="rgba(161,138,255,0.14)" stroke-width="1" fill="none"/>

        <!-- Center-left orbital sweep -->
        <path d="M -60 700 Q 200 500 480 620 Q 760 740 900 600" stroke="rgba(161,138,255,0.20)" stroke-width="1.5" fill="none"/>
        <path d="M -80 800 Q 180 640 440 720 Q 700 800 860 700" stroke="rgba(161,138,255,0.12)" stroke-width="1" fill="none"/>

        <!-- Orbit dots — top right cluster -->
        <circle cx="900" cy="320" r="6" fill="rgba(161,138,255,0.70)"/>
        <circle cx="780" cy="270" r="4" fill="rgba(161,138,255,0.50)"/>
        <circle cx="1020" cy="350" r="4" fill="rgba(161,138,255,0.50)"/>
        <circle cx="680" cy="230" r="3" fill="rgba(161,138,255,0.35)"/>

        <!-- Connecting line between top-right dots -->
        <line x1="780" y1="270" x2="1020" y2="350" stroke="rgba(161,138,255,0.20)" stroke-width="1" stroke-dasharray="5 6"/>

        <!-- Data label near dot -->
        <text x="916" y="315" font-family="DM Sans" font-size="16" fill="rgba(224,216,255,0.55)" font-weight="500" letter-spacing="0.3">LAUNCH</text>

        <!-- Mid-page ellipse system — centered behind content -->
        <ellipse cx="540" cy="1020" rx="560" ry="200" stroke="rgba(161,138,255,0.10)" stroke-width="1.5"/>
        <ellipse cx="540" cy="1020" rx="380" ry="130" stroke="rgba(161,138,255,0.08)" stroke-width="1"/>

        <!-- Lower third — large orbital arc -->
        <path d="M-100 1480 Q 300 1300 540 1400 Q 780 1500 1180 1380" stroke="rgba(161,138,255,0.18)" stroke-width="1.5" fill="none"/>
        <path d="M-60 1560 Q 280 1400 540 1480 Q 800 1560 1140 1450" stroke="rgba(161,138,255,0.11)" stroke-width="1" fill="none"/>

        <!-- Bottom-left orbit cluster -->
        <ellipse cx="180" cy="1660" rx="220" ry="140" stroke="rgba(161,138,255,0.16)" stroke-width="1.5"/>
        <ellipse cx="180" cy="1660" rx="140" ry="90" stroke="rgba(161,138,255,0.10)" stroke-width="1"/>

        <!-- Dots in lower orbit cluster -->
        <circle cx="180" cy="1520" r="6" fill="rgba(161,138,255,0.60)"/>
        <circle cx="310" cy="1630" r="4" fill="rgba(161,138,255,0.45)"/>
        <circle cx="60" cy="1700" r="4" fill="rgba(161,138,255,0.40)"/>
        <circle cx="240" cy="1780" r="3" fill="rgba(161,138,255,0.30)"/>

        <!-- Small decorative cross/plus markers -->
        <g opacity="0.25">
            <line x1="196" y1="480" x2="196" y2="496" stroke="#A18AFF" stroke-width="1.5"/>
            <line x1="188" y1="488" x2="204" y2="488" stroke="#A18AFF" stroke-width="1.5"/>
        </g>
        <g opacity="0.20">
            <line x1="880" y1="900" x2="880" y2="916" stroke="#A18AFF" stroke-width="1.5"/>
            <line x1="872" y1="908" x2="888" y2="908" stroke="#A18AFF" stroke-width="1.5"/>
        </g>

        <!-- Scattered small dots for texture -->
        <circle cx="130" cy="380" r="3" fill="rgba(161,138,255,0.30)"/>
        <circle cx="960" cy="760" r="3" fill="rgba(161,138,255,0.25)"/>
        <circle cx="80" cy="1100" r="2" fill="rgba(161,138,255,0.20)"/>
        <circle cx="1010" cy="1200" r="3" fill="rgba(161,138,255,0.22)"/>
        <circle cx="420" cy="1720" r="2" fill="rgba(161,138,255,0.18)"/>

        <!-- Dashed connection paths -->
        <path d="M 900 320 Q 720 500 540 1020" stroke="rgba(161,138,255,0.12)" stroke-width="1" stroke-dasharray="6 8" fill="none"/>

    </svg>

    <!-- Progress segments (1 of 5) -->
    <div class="progress">
        <div class="segment active"></div>
        <div class="segment"></div>
        <div class="segment"></div>
        <div class="segment"></div>
        <div class="segment"></div>
    </div>

    <!-- Main content -->
    <div class="story-content">

        <p class="eyebrow">Founder Playbook &middot; 2026</p>

        <div style="position: relative;">
            <div class="title-number">5</div>

            <h1 class="title">
                Build Your<br>
                Startup<br>
                <em>the Right Way.</em>
            </h1>
        </div>

        <div class="divider"></div>

        <p class="subtitle">
            5 hard-won tips from founders who made it — and the ones who didn't.
        </p>

        <div class="tag-row">
            <div class="tag">Strategy</div>
            <div class="tag">Growth</div>
            <div class="tag">Fundraising</div>
        </div>

    </div>

    <!-- Swipe hint -->
    <div class="swipe-hint">
        <div class="swipe-dots">
            <div class="swipe-dot"></div>
            <div class="swipe-dot"></div>
            <div class="swipe-dot"></div>
        </div>
        <span>Tap to continue</span>
    </div>

    <!-- Brand -->
    <div class="brand">@gooseworks &middot; 1 / 5</div>

</body>
</html>
