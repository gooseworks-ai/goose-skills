<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>5 Tips for Building a Startup in 2026 — Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #FFFFFF;
      --color-text: #2D2D2D;
      --color-body: #555555;
      --color-meta: #888888;
      --color-dot-empty: #D1D1D1;
      --purple: #9B59B6;
      --purple-mid: #C39BD3;
      --purple-pale: #E8D5F0;
      --blue: #4A6CF7;
      --blue-mid: #8FA8FA;
      --blue-pale: #D4DFFE;
      --orange: #E8541E;
      --orange-mid: #F0956A;
      --orange-pale: #FADDD0;
      --font: 'DM Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    body {
      background: #FFFFFF;
      font-family: 'DM Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>

  <!-- Three dot matrix grids -->
  <div id="grids" style="display: flex; gap: 48px; margin-bottom: 72px;"></div>

  <!-- Eyebrow label -->
  <p style="font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #888888; margin-bottom: 20px;">Founder Playbook &middot; 2026</p>

  <!-- Main title -->
  <h1 style="font-family: 'DM Sans', sans-serif; font-size: 72px; font-weight: 700; line-height: 1.04; letter-spacing: -1.5px; color: #2D2D2D; text-align: center; max-width: 860px; margin-bottom: 28px;">
    5 Tips for Building<br>a Startup in 2026
  </h1>

  <!-- Subtitle -->
  <p style="font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 400; line-height: 1.60; color: #555555; text-align: center; max-width: 580px; letter-spacing: 0.1px;">
    What the most successful founders are doing differently this year
  </p>

  <!-- Slide progress dots -->
  <div style="position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; align-items: center;">
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #2D2D2D;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #D1D1D1;"></div>
  </div>

  <!-- Branding -->
  <div style="position: absolute; bottom: 56px; right: 80px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #888888;">
    2026 Series
  </div>

  <script>
    const container = document.getElementById('grids');

    const colorSets = [
      { saturated: '#9B59B6', mid: '#C39BD3', pale: '#E8D5F0', empty: '#D1D1D1' },
      { saturated: '#4A6CF7', mid: '#8FA8FA', pale: '#D4DFFE', empty: '#D1D1D1' },
      { saturated: '#E8541E', mid: '#F0956A', pale: '#FADDD0', empty: '#D1D1D1' }
    ];

    const cols = 10;
    const rows = 10;
    const dotSize = 13;
    const gap = 5;

    // Color thresholds per row (top = saturated, bottom = gray)
    function rowColor(rowIndex, colors) {
      const bands = [
        colors.saturated, // row 0
        colors.saturated, // row 1
        colors.saturated, // row 2
        colors.mid,       // row 3
        colors.mid,       // row 4
        colors.pale,      // row 5
        colors.pale,      // row 6
        colors.empty,     // row 7
        colors.empty,     // row 8
        colors.empty      // row 9
      ];
      return bands[rowIndex] || colors.empty;
    }

    colorSets.forEach(colors => {
      const grid = document.createElement('div');
      grid.style.cssText = `
        display: grid;
        grid-template-columns: repeat(${cols}, ${dotSize}px);
        gap: ${gap}px;
      `;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const dot = document.createElement('div');
          dot.style.cssText = `
            width: ${dotSize}px;
            height: ${dotSize}px;
            border-radius: 50%;
            background: ${rowColor(r, colors)};
          `;
          grid.appendChild(dot);
        }
      }

      container.appendChild(grid);
    });
  </script>

</body>
</html>
