<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Story 01 — Botanical Illustration</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-olive: #4A5A2B;
            --color-sage: #6B7D3E;
            --color-deep: #3A4A1F;
            --color-cream: #F5F0E0;
            --color-light-sage: #8B9E5A;
            --color-dark: #2E3A18;

            --font-masthead: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-body: 'EB Garamond', Garamond, Georgia, serif;
            --font-meta: 'DM Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --story-width: 1080px;
            --story-height: 1920px;
            --story-padding-x: 72px;
            --story-padding-y: 200px;
            --safe-top: 160px;
            --safe-bottom: 160px;
            --content-max-width: 936px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-olive);
            color: var(--color-cream);
            font-family: var(--font-body);
            position: relative;
        }

        /* =============================================
           PROGRESS SEGMENTS
        ============================================= */
        .progress {
            position: absolute;
            top: 60px;
            left: 72px;
            right: 72px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        .progress .segment {
            flex: 1;
            height: 3px;
            background: rgba(245,240,224,0.30);
            border-radius: 2px;
        }
        .progress .segment.active {
            background: rgba(245,240,224,0.85);
        }

        /* =============================================
           BOTANICAL ILLUSTRATIONS — pure CSS/SVG
        ============================================= */

        .botanical-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* =============================================
           MAIN CONTENT LAYOUT
        ============================================= */
        .content-wrap {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            padding: 200px 72px 220px;
        }

        /* Metadata row */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 48px;
        }
        .meta-label {
            font-family: var(--font-meta);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(245,240,224,0.60);
        }

        /* Thin rule */
        .rule {
            width: 100%;
            height: 1px;
            background: rgba(245,240,224,0.35);
            margin-bottom: 44px;
        }

        /* Masthead */
        .masthead-eyebrow {
            font-family: var(--font-meta);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(245,240,224,0.60);
            margin-bottom: 12px;
        }

        .masthead-title {
            font-family: var(--font-masthead);
            font-size: 96px;
            font-weight: 900;
            line-height: 0.90;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: var(--color-cream);
            text-shadow: 0 2px 12px rgba(0,0,0,0.35);
            margin-bottom: 36px;
        }

        /* Thin rule below masthead */
        .rule-2 {
            width: 100%;
            height: 1px;
            background: rgba(245,240,224,0.35);
            margin-bottom: 36px;
        }

        /* Spacer — botanical illustration occupies the center */
        .illustration-spacer {
            flex: 1;
        }

        /* Bottom content block */
        .bottom-block {
            margin-top: auto;
        }

        .cover-number {
            font-family: var(--font-masthead);
            font-size: 160px;
            font-weight: 900;
            line-height: 1.00;
            letter-spacing: -4px;
            color: rgba(245,240,224,0.12);
            position: absolute;
            right: 52px;
            bottom: 420px;
            z-index: 0;
        }

        .issue-eyebrow {
            font-family: var(--font-meta);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(245,240,224,0.60);
            margin-bottom: 20px;
        }

        .cover-headline {
            font-family: var(--font-masthead);
            font-size: 72px;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -1px;
            color: var(--color-cream);
            text-shadow: 0 2px 10px rgba(0,0,0,0.30);
            margin-bottom: 28px;
        }

        .cover-subhead {
            font-family: var(--font-body);
            font-size: 30px;
            font-weight: 400;
            font-style: italic;
            line-height: 1.40;
            color: rgba(245,240,224,0.85);
            text-shadow: 0 1px 6px rgba(0,0,0,0.25);
            max-width: 780px;
            margin-bottom: 44px;
        }

        /* Bottom rule + brand row */
        .bottom-rule {
            width: 100%;
            height: 1px;
            background: rgba(245,240,224,0.35);
            margin-bottom: 20px;
        }

        .brand-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-handle {
            font-family: var(--font-meta);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(245,240,224,0.60);
        }

        .brand-slide-num {
            font-family: var(--font-meta);
            font-size: 13px;
            font-weight: 500;
            color: rgba(245,240,224,0.40);
        }
    </style>
</head>
<body>

    <div class="content-wrap">
