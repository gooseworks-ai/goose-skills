<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        :root {
            --color-olive: #4A5A2B;
            --color-sage: #6B7D3E;
            --color-deep: #3A4A1F;
            --color-cream: #F5F0E0;
            --color-light-sage: #8B9E5A;
            --color-dark: #2E3A18;
            --cream-85: rgba(245,240,224,0.85);
            --cream-60: rgba(245,240,224,0.60);
            --cream-35: rgba(245,240,224,0.35);

            --font-masthead: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-body: 'EB Garamond', Garamond, Georgia, serif;
            --font-meta: 'DM Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --slide-width: 1080px;
            --slide-height: 1080px;
            --slide-padding: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-olive);
            color: var(--color-cream);
            font-family: var(--font-body);
            position: relative;
        }

        /* =============================================
           BOTANICAL ILLUSTRATION ELEMENTS — SVG-based
           ============================================= */

        .botanical-bg {
            position: absolute;
            inset: 0;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
        }

        /* =============================================
           LAYOUT LAYERS
           ============================================= */

        .meta-row {
            position: absolute;
            top: 52px;
            left: 56px;
            right: 56px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            z-index: 10;
        }

        .meta-text {
            font-family: var(--font-meta);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cream-60);
        }

        .masthead-block {
            position: absolute;
            top: 88px;
            left: 56px;
            right: 56px;
            text-align: center;
            z-index: 10;
        }

        .masthead-pre {
            font-family: var(--font-meta);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cream-60);
            margin-bottom: 6px;
        }

        .masthead-title {
            font-family: var(--font-masthead);
            font-size: 80px;
            font-weight: 900;
            line-height: 0.92;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: var(--color-cream);
            text-shadow: 0 2px 12px rgba(0,0,0,0.35);
        }

        .masthead-rule {
            width: 100%;
            height: 1px;
            background: var(--cream-35);
            margin: 18px 0;
        }

        .headline-block {
            position: absolute;
            bottom: 188px;
            left: 56px;
            right: 56px;
            z-index: 10;
        }

        .headline-label {
            font-family: var(--font-meta);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--cream-60);
            margin-bottom: 14px;
        }

        .headline-title {
            font-family: var(--font-masthead);
            font-size: 62px;
            font-weight: 700;
            line-height: 1.02;
            letter-spacing: -1px;
            color: var(--color-cream);
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 18px;
        }

        .headline-subtitle {
            font-family: var(--font-body);
            font-size: 24px;
            font-weight: 500;
            line-height: 1.35;
            letter-spacing: 0.3px;
            color: var(--cream-85);
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            max-width: 720px;
        }

        .bottom-meta {
            position: absolute;
            bottom: 52px;
            left: 56px;
            right: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .bottom-rule {
            position: absolute;
            bottom: 98px;
            left: 56px;
            right: 56px;
            height: 1px;
            background: var(--cream-35);
            z-index: 10;
        }

        .slide-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--color-cream);
        }

        .dot.active { opacity: 1.0; }
        .dot:not(.active) { opacity: 0.25; }
    </style>
</head>
