<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>5 Tips for Building a Startup in 2026 — Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sage: #7BA88E;
            --color-white: #FFFFFF;
            --color-dark: #1A1A1A;
            --color-desk: #2C3E35;
            --color-mid: #5A8A6E;
            --color-light: #A3C4B0;
            --color-pale: #E8F0EC;
            --color-shadow: #3D5C4A;

            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --story-width: 1080px;
            --story-height: 1920px;
            --story-padding-x: 60px;
            --story-padding-y: 120px;
            --safe-top: 160px;
            --safe-bottom: 160px;
            --content-max-width: 960px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-sage);
            color: var(--color-white);
            font-family: var(--font-body);
            position: relative;
        }

        /* Progress segments */
        .progress {
            position: absolute;
            top: 60px;
            left: 60px;
            right: 60px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .progress .segment {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .progress .segment.active {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Split-word display — top-left fragment */
        .word-top {
            position: absolute;
            top: 200px;
            left: 60px;
            font-family: var(--font-display);
            font-size: 148px;
            font-weight: 700;
            line-height: 0.90;
            letter-spacing: -4px;
            color: var(--color-white);
            z-index: 2;
        }

        /* Split-word display — bottom-right fragment */
        .word-bottom {
            position: absolute;
            bottom: 260px;
            right: 60px;
            font-family: var(--font-display);
            font-size: 148px;
            font-weight: 700;
            line-height: 0.90;
            letter-spacing: -4px;
            color: var(--color-white);
            text-align: right;
            z-index: 2;
        }

        /* Metadata pill — top-left, below word fragment */
        .meta-pill {
            position: absolute;
            top: 390px;
            left: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--color-white);
            color: var(--color-dark);
            font-family: var(--font-body);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 4px;
            z-index: 3;
        }

        /* Sub-label above bottom word */
        .sub-label {
            position: absolute;
            bottom: 460px;
            right: 60px;
            font-family: var(--font-body);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
            text-align: right;
            z-index: 3;
        }

        /* Isometric illustration container */
        .iso-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 680px;
            height: 560px;
            z-index: 1;
        }

        /* ---- Isometric grid system ----
           All shapes use CSS transforms to simulate isometric projection.
           Faces: top (light), left (mid), right (dark shadow)
        */

        /* Isometric desk unit — left */
        .desk-left {
            position: absolute;
            top: 160px;
            left: 60px;
        }

        /* Isometric desk unit — center */
        .desk-center {
            position: absolute;
            top: 80px;
            left: 220px;
        }

        /* Isometric desk unit — right */
        .desk-right {
            position: absolute;
            top: 160px;
            left: 400px;
        }

        /* Shared face styles */
        .iso-top {
            background: var(--color-light);
            position: absolute;
        }

        .iso-left-face {
            background: var(--color-mid);
            position: absolute;
        }

        .iso-right-face {
            background: var(--color-shadow);
            position: absolute;
        }

        /* Isometric box helper — desk */
        .iso-box {
            position: relative;
        }

        /* Floor plane */
        .floor {
            position: absolute;
            bottom: 20px;
            left: -40px;
            width: 760px;
            height: 160px;
            background: var(--color-desk);
            transform: skewX(-30deg) skewY(0deg);
            transform-origin: bottom left;
            opacity: 0.45;
        }

        /* Monitor screens */
        .screen-glow {
            background: var(--color-pale);
            opacity: 0.85;
        }

        /* Branding footer */
        .brand {
            position: absolute;
            bottom: calc(160px + 32px);
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-body);
            font-size: 22px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.5px;
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
