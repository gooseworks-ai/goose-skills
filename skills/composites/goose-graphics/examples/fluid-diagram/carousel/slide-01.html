<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Slide 01 — 5 Tips for Building a Startup in 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-coral: #E8453C;
            --color-maroon: #2D1B2E;
            --color-pink: #F2A0A0;
            --color-coral-line: #E8665C;
            --color-light-coral: #F5C4B8;
            --color-white: #FFFFFF;
            --color-deep: #3D2540;
            --color-dark-coral: #C44035;

            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --slide-width: 1080px;
            --slide-height: 1080px;
            --frame-size: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: var(--slide-width);
            height: var(--slide-height);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--color-coral);
            padding: var(--frame-size);
        }

        .inner-panel {
            width: 100%;
            height: 100%;
            background: var(--color-maroon);
            position: relative;
            overflow: hidden;
        }

        /* Top-left anchor text */
        .anchor-top-left {
            position: absolute;
            top: 56px;
            left: 56px;
            z-index: 10;
        }

        .label-tag {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
            margin-bottom: 20px;
        }

        .display-title {
            font-family: var(--font-display);
            font-size: 68px;
            font-weight: 400;
            line-height: 1.10;
            letter-spacing: -1.5px;
            color: var(--color-white);
            max-width: 580px;
        }

        .display-title em {
            font-style: normal;
            color: var(--color-pink);
        }

        /* Bottom-right anchor text */
        .anchor-bottom-right {
            position: absolute;
            bottom: 56px;
            right: 56px;
            text-align: right;
            z-index: 10;
        }

        .subtitle-text {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 300;
            line-height: 1.65;
            letter-spacing: 0.2px;
            color: rgba(255,255,255,0.60);
            max-width: 320px;
        }

        /* Caption bottom-left */
        .caption-bottom-left {
            position: absolute;
            bottom: 56px;
            left: 56px;
            z-index: 10;
        }

        .caption {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.30);
        }

        /* Slide indicator dots */
        .slide-dots {
            position: absolute;
            bottom: 62px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-white);
            opacity: 0.25;
        }

        .dot.active {
            opacity: 1;
            background: var(--color-pink);
        }

        /* SVG diagram layer */
        .diagram-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="inner-panel">

        <!-- Fluid diagram SVG -->
        <svg class="diagram-layer" width="1016" height="1016" viewBox="0 0 1016 1016" fill="none" xmlns="http://www.w3.org/2000/svg">

            <!-- Background glow blob -->
            <ellipse cx="580" cy="560" rx="320" ry="240" fill="#E8453C" opacity="0.06"/>
            <ellipse cx="720" cy="420" rx="180" ry="140" fill="#F2A0A0" opacity="0.05"/>

            <!-- Main flowing curve — horizontal river -->
            <path d="M-20 620 Q180 520 340 600 Q500 680 660 560 Q820 440 1036 500" stroke="#E8665C" stroke-width="1.5" fill="none" opacity="0.7"/>

            <!-- Secondary flow — upper arc -->
            <path d="M100 480 Q300 360 480 440 Q640 510 780 390 Q900 290 1036 360" stroke="#F5C4B8" stroke-width="1" fill="none" opacity="0.45"/>

            <!-- Tertiary flow — lower sweep -->
            <path d="M-20 730 Q200 680 380 720 Q520 750 680 660 Q820 580 1036 640" stroke="#E8665C" stroke-width="1" fill="none" opacity="0.30"/>

            <!-- Pill node 1 — left area -->
            <rect x="248" y="576" width="148" height="48" rx="24" fill="#F2A0A0" opacity="0.9"/>
            <circle cx="322" cy="600" r="10" fill="#2D1B2E"/>
            <circle cx="322" cy="600" r="4" fill="#F2A0A0"/>
            <!-- Pill label -->
            <text x="322" y="632" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.40)" letter-spacing="0.8">validate</text>

            <!-- Pill node 2 — center-right -->
            <rect x="576" y="532" width="160" height="48" rx="24" fill="#F2A0A0" opacity="0.85"/>
            <circle cx="656" cy="556" r="10" fill="#2D1B2E"/>
            <circle cx="656" cy="556" r="4" fill="#E8665C"/>
            <!-- Pill label -->
            <text x="656" y="588" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.40)" letter-spacing="0.8">iterate</text>

            <!-- Pill node 3 — far right hint -->
            <rect x="830" y="472" width="140" height="48" rx="24" fill="#F2A0A0" opacity="0.60"/>
            <circle cx="900" cy="496" r="10" fill="#2D1B2E"/>
            <circle cx="900" cy="496" r="4" fill="#F5C4B8"/>

            <!-- Junction circle 1 — center-left -->
            <circle cx="460" cy="616" r="30" stroke="#3D2540" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
            <circle cx="460" cy="616" r="6" fill="#E8665C"/>
            <text x="460" y="658" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.8">launch</text>

            <!-- Junction circle 2 — upper mid -->
            <circle cx="640" cy="436" r="22" stroke="#3D2540" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
            <circle cx="640" cy="436" r="5" fill="#F5C4B8"/>
            <text x="640" y="475" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" letter-spacing="0.8">scale</text>

            <!-- Junction circle 3 — small far right -->
            <circle cx="820" cy="390" r="16" stroke="#3D2540" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity="0.6"/>
            <circle cx="820" cy="390" r="4" fill="#E8665C" opacity="0.5"/>

            <!-- Connector branch line from pill 1 to junction 1 -->
            <path d="M396 600 Q428 608 430 616" stroke="#E8665C" stroke-width="1" fill="none" opacity="0.5"/>

            <!-- Connector from junction 1 to pill 2 -->
            <path d="M490 616 Q530 590 576 556" stroke="#E8665C" stroke-width="1" fill="none" opacity="0.5"/>

            <!-- Vertical accent drip from pill 2 down -->
            <path d="M656 580 Q660 630 648 680" stroke="#F5C4B8" stroke-width="1" fill="none" opacity="0.35"/>
            <circle cx="648" cy="682" r="4" fill="#F2A0A0" opacity="0.4"/>

            <!-- Small decorative node cluster top-right area -->
            <circle cx="860" cy="300" r="5" fill="#F2A0A0" opacity="0.35"/>
            <circle cx="890" cy="320" r="3" fill="#E8665C" opacity="0.3"/>
            <circle cx="875" cy="340" r="4" fill="#F5C4B8" opacity="0.25"/>

            <!-- Large outer ghost circle — top right -->
            <circle cx="860" cy="280" r="80" stroke="#3D2540" stroke-width="1" stroke-dasharray="5 4" fill="none" opacity="0.3"/>

            <!-- Subtle grid dots — scattered -->
            <circle cx="140" cy="400" r="2" fill="rgba(242,160,160,0.2)"/>
            <circle cx="200" cy="450" r="1.5" fill="rgba(242,160,160,0.15)"/>
            <circle cx="760" cy="700" r="2" fill="rgba(232,102,92,0.2)"/>
            <circle cx="820" cy="740" r="1.5" fill="rgba(232,102,92,0.15)"/>
            <circle cx="160" cy="700" r="2" fill="rgba(245,196,184,0.2)"/>

            <!-- Number badge — "5" large ghost -->
            <text x="860" y="820" font-family="Space Grotesk, sans-serif" font-size="260" font-weight="700" fill="rgba(232,69,60,0.08)" letter-spacing="-4">5</text>
        </svg>

        <!-- Top-left anchor -->
        <div class="anchor-top-left">
            <p class="label-tag">Startup Playbook · 2026</p>
            <h1 class="display-title">5 tips for<br>building a<br><em>startup</em><br>in 2026</h1>
        </div>

        <!-- Bottom-right anchor -->
        <div class="anchor-bottom-right">
            <p class="subtitle-text">What actually works when everything is changing fast</p>
        </div>

        <!-- Caption bottom-left -->
        <div class="caption-bottom-left">
            <p class="caption">Goose Graphics · Fluid Diagrams</p>
        </div>

        <!-- Slide dots -->
        <div class="slide-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

    </div>
</body>
</html>
