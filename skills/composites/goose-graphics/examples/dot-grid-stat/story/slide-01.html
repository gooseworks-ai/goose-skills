<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Story 01 — 5 Tips for Building a Startup in 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #2A2D32;
      --color-white: #FFFFFF;
      --color-teal: #00B894;
      --color-teal-deep: #00A381;
      --color-teal-dark: #007D63;
      --color-dot-empty: #3A3D42;
      --color-inset: #1E2024;
      --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      --story-width: 1080px;
      --story-height: 1920px;
      --story-padding-x: 80px;
      --story-padding-y: 200px;
      --safe-top: 160px;
      --safe-bottom: 160px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-white);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--story-padding-y) var(--story-padding-x);
      position: relative;
    }

    /* Progress bar */
    .progress {
      position: absolute;
      top: 64px;
      left: 80px;
      right: 80px;
      display: flex;
      gap: 8px;
    }

    .progress .seg {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
    }

    .progress .seg.active {
      background: var(--color-white);
    }

    /* Top block */
    .top-block {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      font-family: var(--font-body);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--color-teal);
      margin-bottom: 28px;
    }

    .stat-number {
      font-family: var(--font-display);
      font-size: 320px;
      font-weight: 700;
      line-height: 0.85;
      letter-spacing: -12px;
      color: var(--color-white);
    }

    .stat-unit {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--color-teal);
      margin-top: 12px;
      text-transform: uppercase;
    }

    .stat-descriptor {
      font-family: var(--font-body);
      font-size: 30px;
      font-weight: 400;
      line-height: 1.45;
      color: rgba(255,255,255,0.70);
      margin-top: 36px;
      max-width: 700px;
    }

    .stat-descriptor strong {
      color: var(--color-white);
      font-weight: 700;
    }

    /* Bottom block: dot grid + brand */
    .bottom-block {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* Divider line */
    .divider {
      width: 80px;
      height: 3px;
      background: var(--color-teal);
    }

    /* Sub-heading */
    .sub-heading {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 600;
      line-height: 1.20;
      letter-spacing: -0.5px;
      color: rgba(255,255,255,0.90);
      max-width: 820px;
    }

    /* Dot grid */
    .dot-grid-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .dot-grid-label {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 20px;
    }

    .dot-grid {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      gap: 12px;
    }

    .dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .dot-filled-1 { background: var(--color-teal); }
    .dot-filled-2 { background: var(--color-teal); opacity: 0.88; }
    .dot-filled-3 { background: var(--color-teal-deep); opacity: 0.80; }
    .dot-filled-4 { background: var(--color-teal-deep); opacity: 0.70; }
    .dot-filled-5 { background: var(--color-teal-dark); opacity: 0.65; }
    .dot-empty    { background: var(--color-dot-empty); }

    /* Brand */
    .brand {
      position: absolute;
      bottom: 200px;
      left: 80px;
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-white);
    }

    .brand span {
      color: var(--color-teal);
    }

    /* Slide counter */
    .slide-counter {
      position: absolute;
      bottom: 200px;
      right: 80px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Progress segments -->
  <div class="progress">
    <div class="seg active"></div>
    <div class="seg"></div>
    <div class="seg"></div>
    <div class="seg"></div>
    <div class="seg"></div>
    <div class="seg"></div>
  </div>

  <!-- Top: Hero stat + descriptor -->
  <div class="top-block">
    <p class="eyebrow">2026 Startup Guide</p>
    <div class="stat-number">5</div>
    <p class="stat-unit">Tips</p>
    <p class="stat-descriptor">
      Essential moves for <strong>building a startup</strong><br>
      that survives — and scales — in 2026.
    </p>
  </div>

  <!-- Bottom: dot grid + sub-heading -->
  <div class="bottom-block">
    <div class="divider"></div>
    <p class="sub-heading">From zero to traction:<br>what actually works now.</p>

    <div class="dot-grid-wrapper">
      <p class="dot-grid-label">5 of 5 tips covered</p>
      <div class="dot-grid">
        <!-- Row 1: 5 filled, 5 empty -->
        <div class="dot dot-filled-1"></div>
        <div class="dot dot-filled-2"></div>
        <div class="dot dot-filled-3"></div>
        <div class="dot dot-filled-4"></div>
        <div class="dot dot-filled-5"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <!-- Row 2: all empty -->
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <!-- Row 3: all empty -->
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
        <div class="dot dot-empty"></div>
      </div>
    </div>
  </div>

  <!-- Brand mark -->
  <div class="brand">goose<span>.</span></div>
  <div class="slide-counter">1 / 6</div>

</body>
</html>
