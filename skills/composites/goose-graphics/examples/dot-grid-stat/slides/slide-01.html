<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>5 Tips for Building a Startup in 2026 — Slide 01</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #2A2D32;
            --color-white: #FFFFFF;
            --color-teal: #00B894;
            --color-teal-deep: #00A381;
            --color-teal-dark: #007D63;
            --color-dot-empty: #3A3D42;
            --color-inset: #1E2024;

            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --slide-width: 1920px;
            --slide-height: 1080px;
            --slide-padding: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-bg);
            font-family: var(--font-body);
            position: relative;
        }

        .slide {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            background: var(--color-bg);
            padding: var(--slide-padding);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Subtle texture overlay — thin horizontal rule accent */
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-teal) 0%, var(--color-teal-deep) 40%, transparent 100%);
        }

        /* ── TOP SECTION ── */
        .top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            width: 100%;
        }

        .stat-hero {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-number {
            font-family: var(--font-display);
            font-size: 220px;
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -8px;
            color: var(--color-white);
            /* teal tint on the number to tie it to the dot grid */
        }

        .stat-number span.teal {
            color: var(--color-teal);
        }

        .stat-label {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 18px;
        }

        /* ── HEADLINE + SUBTITLE (center-left) ── */
        .headline-block {
            display: flex;
            flex-direction: column;
            gap: 0;
            max-width: 900px;
            align-self: flex-end;
            padding-bottom: 12px;
        }

        .eyebrow {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--color-teal);
            margin-bottom: 16px;
        }

        .main-headline {
            font-family: var(--font-display);
            font-size: 72px;
            font-weight: 700;
            line-height: 1.0;
            letter-spacing: -2px;
            color: var(--color-white);
        }

        .main-headline em {
            font-style: normal;
            color: var(--color-teal);
        }

        /* ── BOTTOM SECTION ── */
        .bottom-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
        }

        .bottom-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .subtitle {
            font-family: var(--font-body);
            font-size: 18px;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 0.2px;
            color: rgba(255, 255, 255, 0.70);
            max-width: 520px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .meta-divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.2);
        }

        .meta-text {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        .brand {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--color-white);
        }

        /* ── DOT GRID ── */
        .dot-grid-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .dot-grid-label {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.30);
            margin-bottom: 4px;
            text-align: right;
        }

        .dot-grid {
            display: grid;
            grid-template-columns: repeat(5, 40px);
            gap: 10px;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* Row 1 — fully filled teal (tip 1 indicator) */
        .dot.filled-1 { background: var(--color-teal); opacity: 1.0; }
        /* Row 2 — second tier */
        .dot.filled-2 { background: var(--color-teal); opacity: 0.85; }
        /* Row 3 — mid fill */
        .dot.filled-3 { background: var(--color-teal-deep); opacity: 0.80; }
        /* Row 4 — darker */
        .dot.filled-4 { background: var(--color-teal-deep); opacity: 0.65; }
        /* Row 5 — darkest filled */
        .dot.filled-5 { background: var(--color-teal-dark); opacity: 0.60; }
        /* Empty slots */
        .dot.empty { background: var(--color-dot-empty); }

        /* Inset panel for the tip count badge */
        .tip-count-badge {
            background: var(--color-inset);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 28px;
            gap: 4px;
        }

        .badge-number {
            font-family: var(--font-display);
            font-size: 56px;
            font-weight: 700;
            line-height: 1.0;
            letter-spacing: -2px;
            color: var(--color-teal);
        }

        .badge-label {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        /* Slide number */
        .slide-number {
            position: absolute;
            bottom: var(--slide-padding);
            right: var(--slide-padding);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="slide">

        <!-- TOP ROW: stat hero (left) + headline (right) -->
        <div class="top-row">

            <!-- Oversized "5" hero stat -->
            <div class="stat-hero">
                <div class="stat-number"><span class="teal">5</span></div>
                <p class="stat-label">Essential Tips</p>
            </div>

            <!-- Headline block, pinned to bottom of top row -->
            <div class="headline-block">
                <p class="eyebrow">Founder Playbook · 2026</p>
                <h1 class="main-headline">
                    Building a<br>
                    Startup That<br>
                    <em>Actually Survives</em>
                </h1>
            </div>

        </div>

        <!-- BOTTOM ROW: subtitle + meta (left) + dot grid (right) -->
        <div class="bottom-row">

            <div class="bottom-left">
                <p class="subtitle">
                    The rules changed. AI, lean capital, and remote-first markets have rewritten the founder's handbook. Here's what works in 2026.
                </p>
                <div class="meta-row">
                    <span class="brand">goose.</span>
                    <div class="meta-divider"></div>
                    <span class="meta-text">April 2026</span>
                    <div class="meta-divider"></div>
                    <span class="meta-text">Founder Series</span>
                </div>
            </div>

            <!-- Dot grid — 5 cols × 5 rows = 25 dots, 5 fully lit (one per tip) -->
            <div class="dot-grid-container">
                <p class="dot-grid-label">5 of 5 tips</p>
                <div class="dot-grid">
                    <!-- Row 1: all 5 filled (all tips present) -->
                    <div class="dot filled-1"></div>
                    <div class="dot filled-1"></div>
                    <div class="dot filled-1"></div>
                    <div class="dot filled-1"></div>
                    <div class="dot filled-1"></div>
                    <!-- Row 2 -->
                    <div class="dot filled-2"></div>
                    <div class="dot filled-2"></div>
                    <div class="dot filled-2"></div>
                    <div class="dot filled-2"></div>
                    <div class="dot filled-2"></div>
                    <!-- Row 3 -->
                    <div class="dot filled-3"></div>
                    <div class="dot filled-3"></div>
                    <div class="dot filled-3"></div>
                    <div class="dot filled-3"></div>
                    <div class="dot filled-3"></div>
                    <!-- Row 4 -->
                    <div class="dot filled-4"></div>
                    <div class="dot filled-4"></div>
                    <div class="dot filled-4"></div>
                    <div class="dot filled-4"></div>
                    <div class="dot filled-4"></div>
                    <!-- Row 5: darkest -->
                    <div class="dot filled-5"></div>
                    <div class="dot filled-5"></div>
                    <div class="dot filled-5"></div>
                    <div class="dot filled-5"></div>
                    <div class="dot filled-5"></div>
                </div>
            </div>

        </div>

        <div class="slide-number">01</div>

    </div>
</body>
</html>
