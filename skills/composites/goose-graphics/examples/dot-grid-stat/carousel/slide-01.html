<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Slide 01 — Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #2A2D32;
            --color-white: #FFFFFF;
            --color-teal: #00B894;
            --color-teal-deep: #00A381;
            --color-teal-dark: #007D63;
            --color-dot-empty: #3A3D42;
            --color-inset: #1E2024;
            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #2A2D32;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            position: relative;
        }
    </style>
</head>
<body>

    <!-- TOP: Metadata label + Hero stat number + small descriptor -->
    <div>
        <p style="font-family:'Inter',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.45); margin:0 0 28px 0;">Startup Playbook &middot; 2026</p>

        <h1 style="font-family:'Space Grotesk',sans-serif; font-size:200px; font-weight:700; line-height:0.85; letter-spacing:-6px; color:#FFFFFF; margin:0;">5</h1>

        <p style="font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.5px; color:rgba(255,255,255,0.70); margin:20px 0 0 0; max-width:280px;">
            essential tips every founder<br>needs in <strong style="color:#FFFFFF; font-weight:700;">2026</strong>
        </p>
    </div>

    <!-- MIDDLE: Main title + subtitle -->
    <div>
        <div style="width:48px; height:3px; background:#00B894; margin-bottom:24px;"></div>
        <h2 style="font-family:'Space Grotesk',sans-serif; font-size:64px; font-weight:700; line-height:1.0; letter-spacing:-2px; color:#FFFFFF; margin:0;">Building<br>a Startup</h2>
        <p style="font-family:'Inter',sans-serif; font-size:20px; font-weight:400; line-height:1.6; letter-spacing:0.2px; color:rgba(255,255,255,0.70); margin:20px 0 0 0; max-width:580px;">What separates the founders who make it from those who don&rsquo;t.</p>
    </div>

    <!-- BOTTOM: Brand (left) + Dot grid (right) -->
    <div style="display:flex; justify-content:space-between; align-items:flex-end;">

        <!-- Brand mark -->
        <p style="font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; letter-spacing:-0.5px; color:#FFFFFF; margin:0;">Goose</p>

        <!-- Dot grid: 5 cols x 5 rows = 25 dots, top row teal (5 filled = the stat) -->
        <div style="display:grid; grid-template-columns:repeat(5,28px); gap:8px;">

            <!-- Row 1: 5 teal dots — the "5" stat visualized -->
            <div style="width:28px;height:28px;border-radius:50%;background:#00B894;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#00B894;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#00A381;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#00A381;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#007D63;"></div>

            <!-- Row 2: empty -->
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>

            <!-- Row 3: empty -->
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>

            <!-- Row 4: empty -->
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>

            <!-- Row 5: empty -->
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>
            <div style="width:28px;height:28px;border-radius:50%;background:#3A3D42;"></div>

        </div>
    </div>

</body>
</html>
